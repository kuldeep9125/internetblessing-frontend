[build]
  command = "npm run build"
  publish = "build"

# Proxy all /api/* requests to Railway backend
[[redirects]]
  from = "/api/*"
  to = "https://web-production-0b6d5.up.railway.app/api/:splat"
  status = 200
  force = true

# SPA fallback - must come after the API proxy
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[build.environment]
  CI = "false"
